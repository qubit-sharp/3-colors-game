<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3 Colors Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation; /* Запрет зума по двойному тапу на мобильных */
        }
        h1 { margin-top: 10px; font-size: 24px; text-align: center; }
        #game-container {
            position: relative;
            margin: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }
        canvas { display: block; cursor: pointer; }
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .color-btn {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            border: 3px solid #ccc;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .color-btn.active {
            border-color: #333;
            transform: scale(1.1);
        }
        #message {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #2e7d32;
            min-height: 24px;
        }
        button.action-btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Закрась карту (3 цвета)</h1>
    
    <div class="controls">
        <div class="color-btn active" style="background-color: #ff5252;" data-color="1"></div>
        <div class="color-btn" style="background-color: #448aff;" data-color="2"></div>
        <div class="color-btn" style="background-color: #69f0ae;" data-color="3"></div>
        <div class="color-btn" style="background-color: #ffffff; text-align:center; line-height:44px; font-size:24px;" data-color="0">🧽</div>
    </div>

    <div id="game-container">
        <canvas id="mapCanvas" width="350" height="350"></canvas>
    </div>
    
    <div id="message"></div>
    <button class="action-btn" onclick="initGame()">Новая карта</button>

    <script>
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const messageEl = document.getElementById('message');
        const colorBtns = document.querySelectorAll('.color-btn');
        
        // Палитра: 0 - Ластик (белый), 1 - Красный, 2 - Синий, 3 - Зеленый
        const COLORS = ["#ffffff", "#ff5252", "#448aff", "#69f0ae"];
        const GRID_SIZE = 50; // Разрешение сетки для генерации
        let cellSize = canvas.width / GRID_SIZE;
        
        let regionsCount = 0;
        let grid = [];
        let adjMatrix = [];
        let regionColors = [];
        let selectedColor = 1;

        // --- ВАШ АЛГОРИТМ ПРОВЕРКИ ИЗ ПРЕДЫДУЩЕГО ОТВЕТА ---
        function isSafe(v, graph, colors, c) {
            for (let i = 0; i < graph.length; i++) {
                if (graph[v][i] === 1 && c === colors[i]) return false;
            }
            return true;
        }
        function graphColoringUtil(graph, m, colors, v) {
            if (v === graph.length) return true;
            for (let c = 1; c <= m; c++) {
                if (isSafe(v, graph, colors, c)) {
                    colors[v] = c;
                    if (graphColoringUtil(graph, m, colors, v + 1)) return true;
colors[v] = 0;
                }
            }
            return false;
        }
        function canBeColored3(graph) {
            let testColors = new Array(graph.length).fill(0);
            return graphColoringUtil(graph, 3, testColors, 0);
        }
        // ----------------------------------------------------

        // Выбор цвета в UI
        colorBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                colorBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedColor = parseInt(btn.dataset.color);
            });
        });

        // Клик по карте
        canvas.addEventListener('mousedown', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // предотвращаем двойное срабатывание
            handleClick(e.touches[0]);
        }, {passive: false});

        function handleClick(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const gridX = Math.floor(x / cellSize);
            const gridY = Math.floor(y / cellSize);
            
            if (gridX >= 0 && gridX < GRID_SIZE && gridY >= 0 && gridY < GRID_SIZE) {
                const regionId = grid[gridY][gridX];
                regionColors[regionId] = selectedColor;
                drawMap();
                checkWinCondition();
            }
        }

        // Генерация карты (пока не найдется та, что красится в 3 цвета)
        function initGame() {
            messageEl.innerText = "Генерация...";
            setTimeout(() => {
                let validMap = false;
                while (!validMap) {
                    generateRegions();
                    buildAdjacency();
                    // Гарантируем, что сгенерированная карта решаема
                    if (canBeColored3(adjMatrix)) {
                        validMap = true;
                    }
                }
                regionColors = new Array(regionsCount).fill(0);
                drawMap();
                messageEl.innerText = "";
            }, 50); // Небольшая задержка, чтобы UI успел обновиться
        }

        function generateRegions() {
            // Случайное число стран от 8 до 15
            regionsCount = Math.floor(Math.random() * 8) + 8;
            
            // Инициализация пустой сетки
            grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(-1));
            
            let queue = [];
            // Расстановка случайных центров (семян)
            for (let i = 0; i < regionsCount; i++) {
                let rx, ry;
                do {
                    rx = Math.floor(Math.random() * GRID_SIZE);
                    ry = Math.floor(Math.random() * GRID_SIZE);
                } while (grid[ry][rx] !== -1);
                
                grid[ry][rx] = i;
                queue.push({x: rx, y: ry, id: i});
            }

            // Рост регионов (BFS) для хаотичных границ
            const dirs = [[0,1], [1,0], [0,-1], [-1,0]];
            while (queue.length > 0) {
                // Извлекаем случайный элемент для большей хаотичности
                let idx = Math.floor(Math.random() * queue.length);
                let current = queue.splice(idx, 1)[0];
                
                for (let d of dirs) {
                    let nx = current.x + d[0];
                    let ny = current.y + d[1];
                    
                    if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && grid[ny][nx] === -1) {
                        grid[ny][nx] = current.id;
                        queue.push({x: nx, y: ny, id: current.id});
                    }
                }
            }
        }
function buildAdjacency() {
            adjMatrix = Array(regionsCount).fill().map(() => Array(regionsCount).fill(0));
            // Проверяем соседей по сетке
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    let r1 = grid[y][x];
                    // Сосед справа
                    if (x < GRID_SIZE - 1) {
                        let r2 = grid[y][x+1];
                        if (r1 !== r2) { adjMatrix[r1][r2] = 1; adjMatrix[r2][r1] = 1; }
                    }
                    // Сосед снизу
                    if (y < GRID_SIZE - 1) {
                        let r2 = grid[y+1][x];
                        if (r1 !== r2) { adjMatrix[r1][r2] = 1; adjMatrix[r2][r1] = 1; }
                    }
                }
            }
        }

        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Рисуем заливку
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    let regionId = grid[y][x];
                    let colorIdx = regionColors[regionId];
                    ctx.fillStyle = COLORS[colorIdx];
                    ctx.fillRect(x * cellSize, y * cellSize, cellSize + 0.5, cellSize + 0.5);
                }
            }

            // Рисуем границы (улучшает внешний вид)
            ctx.fillStyle = "#333";
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    let r1 = grid[y][x];
                    if (x < GRID_SIZE - 1 && r1 !== grid[y][x+1]) {
                        ctx.fillRect((x + 1) * cellSize - 1, y * cellSize, 2, cellSize);
                    }
                    if (y < GRID_SIZE - 1 && r1 !== grid[y+1][x]) {
                        ctx.fillRect(x * cellSize, (y + 1) * cellSize - 1, cellSize, 2);
                    }
                }
            }
        }

        function checkWinCondition() {
            let isFull = true;
            let hasError = false;

            for (let i = 0; i < regionsCount; i++) {
                if (regionColors[i] === 0) isFull = false; // Есть незакрашенные
                
                // Проверяем конфликты
                for (let j = 0; j < regionsCount; j++) {
                    if (adjMatrix[i][j] === 1 && regionColors[i] !== 0 && regionColors[i] === regionColors[j]) {
                        hasError = true;
                    }
                }
            }

            if (isFull && !hasError) {
                messageEl.innerText = "🎉 Победа! Карта раскрашена!";
            } else if (hasError) {
                messageEl.innerText = "⚠️ Ошибка: одинаковые цвета рядом!";
            } else {
                messageEl.innerText = "";
            }
        }

        // Запуск при загрузке
        initGame();
    </script>
</body>
</html>
